workflows:
  build-ios-sideload:
    name: Build iOS IPA for Sideloadly
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Build Unsigned iOS ARM64 App (Bypass Apple Signing Rules)
        script: |
          # 1. Tải thư viện và chuẩn bị Pods
          flutter pub get
          flutter build ios --config-only --no-codesign || (cd ios && pod install || true)

          # 2. BẺ KHÓA XCODE: ÉP BUỘC DỊCH MÃ ARM64 KHÔNG CẦN CHỮ KÝ (UNSIGNED)
          # Lách qua luật cấm Ad-Hoc của Apple để lấy bản app trần cho Sideloadly tự ký
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$PWD/build/ios" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package Unsigned IPA for Sideloadly
        script: |
          # 3. Gom thư mục Runner.app trần thành file .ipa chuẩn cho Sideloadly
          mkdir -p build/ios/Payload
          APP_PATH=$(find build/ios -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" build/ios/Payload/
          cd build/ios && zip -r DATN_Final_Release.ipa Payload
    artifacts:
      - build/ios/DATN_Final_Release.ipa