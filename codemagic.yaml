workflows:
  build-ios-sideload:
    name: Build iOS IPA for Sideloadly
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Repair iOS Project & Get Packages
        script: |
          # 1. Tự động tái tạo file Podfile và các file iOS gốc bị thiếu (do code trên Windows)
          flutter create . --platforms=ios
          flutter pub get
      - name: Config iOS + Install Pods
        script: |
          # 2. Tạo config Xcode
          flutter build ios --config-only --no-codesign || true
          
          # 3. Cài đặt thư viện Apple (Có kiểm tra an toàn chống sập build)
          if [ -f ios/Podfile ]; then
            echo "🎉 Đã tìm thấy Podfile! Đang tải thư viện iOS..."
            cd ios && pod install --repo-update
          else
            echo "⚠️ Không tìm thấy Podfile, bỏ qua bước pod install."
          fi
      - name: Build Unsigned iOS App & Package IPA for Sideloadly
        script: |
          # 4. Dịch mã ARM64 không chữ ký và CẤM kiểm tra App Store (VALIDATE_PRODUCT=NO)
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$PWD/build/ios" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            VALIDATE_PRODUCT=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build || true

          # 5. Đóng gói IPA cho Sideloadly
          echo "Đang đóng gói IPA cho Sideloadly..."
          mkdir -p build/ios/Payload
          APP_PATH=$(find build/ios -name "*.app" -type d | head -n 1)
          
          if [ -d "$APP_PATH" ]; then
            cp -r "$APP_PATH" build/ios/Payload/
            cd build/ios && zip -r DATN_Final_Release.ipa Payload
            echo "🎉 ĐÃ TẠO THÀNH CÔNG FILE: build/ios/DATN_Final_Release.ipa"
          else
            echo "🚨 Lỗi: Không tìm thấy thư mục .app để đóng gói!"
            exit 1
          fi
    artifacts:
      - build/ios/DATN_Final_Release.ipa