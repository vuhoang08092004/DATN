workflows:
  build-ios-sideload:
    name: Build iOS IPA for Sideloadly
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Prepare Ad-Hoc Signing
        script: |
          # Khóa tuyệt đối các cờ cấm chữ ký để tránh lỗi Xcode 15
          sed -i '' 's/CODE_SIGNING_ALLOWED = NO;/CODE_SIGNING_ALLOWED = YES;/g' ios/Runner.xcodeproj/project.pbxproj || true
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj || true
      - name: Build iOS App SẠCH (Không có --no-codesign)
        script: |
          flutter pub get
          flutter build ios --release
      - name: Package IPA for Sideloadly
        script: |
          mkdir -p build/ios/Payload
          cp -r build/ios/iphoneos/Runner.app build/ios/Payload/ 2>/dev/null || cp -r build/ios/Release-iphoneos/Runner.app build/ios/Payload/
          cd build/ios && zip -r DATN_Final_Release.ipa Payload
    artifacts:
      - build/ios/DATN_Final_Release.ipa