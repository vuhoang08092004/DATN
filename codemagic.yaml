workflows:
  build-ios-sideload:
    name: Build iOS IPA for Sideloadly
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Config iOS + Install Pods
        script: |
          flutter build ios --config-only --no-codesign
          cd ios && pod install
      - name: Build Unsigned iOS App & Package IPA for Sideloadly
        script: |
          # 1. Dịch mã ARM64 không chữ ký và CẤM kiểm tra App Store (VALIDATE_PRODUCT=NO)
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$PWD/build/ios" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            VALIDATE_PRODUCT=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build || true  # <-- Lách qua mọi cảnh báo kiểm tra cuối cùng của Apple

          # 2. Đảm bảo tìm thấy Runner.app vừa dịch xong để nén ra .ipa
          echo "正在đóng gói IPA cho Sideloadly..."
          mkdir -p build/ios/Payload
          APP_PATH=$(find build/ios -name "*.app" -type d | head -n 1)
          
          if [ -d "$APP_PATH" ]; then
            cp -r "$APP_PATH" build/ios/Payload/
            cd build/ios && zip -r DATN_Final_Release.ipa Payload
            echo "🎉 ĐÃ TẠO THÀNH CÔNG FILE: build/ios/DATN_Final_Release.ipa"
          else
            echo "🚨 Lỗi: Không tìm thấy thư mục .app để đóng gói!"
            exit 1
          fi
    artifacts:
      - build/ios/DATN_Final_Release.ipa