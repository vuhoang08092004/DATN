workflows:
  build-ios-sideload:
    name: Build iOS IPA for Sideloadly
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Build iOS ARM64 via Xcode (Bypass Flutter Keychain Check)
        script: |
          # 1. Tải thư viện Flutter và chuẩn bị CocoaPods
          flutter pub get
          flutter build ios --config-only --no-codesign || (cd ios && pod install || true)

          # 2. GỌI THẲNG XCODEBUILD VỚI CHỮ KÝ AD-HOC (-)
          # (Tuyệt chiêu: Lách qua bài kiểm tra của Flutter CLI và thỏa mãn luật Xcode 15)
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            SYMROOT="$PWD/build/ios" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package IPA for Sideloadly
        script: |
          # 3. Gom App thành file .ipa chuẩn chỉnh cho Sideloadly
          mkdir -p build/ios/Payload
          APP_PATH=$(find build/ios -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" build/ios/Payload/
          cd build/ios && zip -r DATN_Final_Release.ipa Payload
    artifacts:
      - build/ios/DATN_Final_Release.ipa